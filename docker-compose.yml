services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futsal_next_app
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/futsal_laravel?schema=public
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: futsal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: futsal_laravel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d futsal_laravel"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
