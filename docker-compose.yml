services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futsal_next_app
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/futsal_laravel?schema=public
      - ADMIN_EMAIL=${ADMIN_EMAIL:-superadmin@example.com}
      - ADMIN_MOBILE=${ADMIN_MOBILE:-+919999999999}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@123456}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: futsal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: futsal_laravel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d futsal_laravel"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
