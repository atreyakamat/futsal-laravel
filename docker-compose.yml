services:
  postgres:
    image: postgres:16-alpine
    container_name: futsal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: futsal_laravel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d futsal_laravel"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futsal_next_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/futsal_laravel?schema=public
      PAYU_MERCHANT_KEY: ${PAYU_MERCHANT_KEY:-}
      PAYU_SALT: ${PAYU_SALT:-}
      PAYU_BASE_URL: ${PAYU_BASE_URL:-https://test.payu.in}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3333}
    ports:
      - "3333:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
