name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Write SSH Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ./deploy_key
          if [ ! -s ./deploy_key ] || [ $(wc -c < ./deploy_key) -lt 50 ]; then
            echo "::error::SSH_PRIVATE_KEY secret is missing, empty, or too short! Please verify the secret in GitHub Settings."
            exit 1
          fi
          
      - name: Trigger Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key_path: ./deploy_key
          script: |
            sudo sh -c '
              cd /opt/stacks/agnel-arena
              git fetch --all
              git reset --hard origin/main
              ./deploy.sh
            '
